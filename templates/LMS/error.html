{% extends 'LMS/layout.html' %}

{% block title %}
{{error.title}}
{% endblock %}

{% block body %}

<section class="flex items-center align-center w-full h-screen p-16">
    <div class="container flex flex-col items-center ">
        <div class="flex flex-col gap-6 max-w-md text-center">
            <h2 class="font-extrabold text-9xl">
                <span class="sr-only">Error</span>{{error.code}}
            </h2>
            <p class="text-2xl md:text-3xl dark:text-gray-300">{{error.message}}</p>
            <a href="{% url 'index' %}"
                class="px-8 py-4 text-xl font-semibold rounded bg-purple-600 text-gray-50 hover:text-gray-200">Back
                to
                home</a>
        </div>
    </div>
</section>
{%endblock%}
